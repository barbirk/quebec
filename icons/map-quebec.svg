<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" style="width: 100%; height: 100%; max-height: 280px;">
  <!-- Background -->
  <rect width="400" height="350" fill="#1a1a2e"/>
  
  <!-- Water/St. Lawrence River -->
  <path d="M 180 280 Q 200 200 190 150 Q 185 100 200 50" 
        stroke="#4a9eff" stroke-width="25" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M 180 280 Q 200 200 190 150 Q 185 100 200 50" 
        stroke="#4a9eff" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Quebec regions - simplified shapes -->
  
  <!-- Southern Quebec (Montreal area) -->
  <path d="M 120 250 L 180 240 L 190 280 L 130 290 Z" 
        fill="#2d3a5c" stroke="#4a9eff" stroke-width="2"/>
  
  <!-- Valleyfield area -->
  <ellipse cx="110" cy="260" rx="35" ry="25" 
           fill="#3d4a6c" stroke="#ffa53e" stroke-width="2" stroke-dasharray="4,2"/>
  
  <!-- Thetford Mines area -->
  <ellipse cx="280" cy="220" rx="40" ry="35" 
           fill="#3d4a6c" stroke="#9c6fff" stroke-width="2" stroke-dasharray="4,2"/>
  
  <!-- Laurentides -->
  <path d="M 140 180 L 200 160 L 220 200 L 160 220 Z" 
        fill="#2d4a3c" stroke="#4caf93" stroke-width="2"/>
  <text x="170" y="195" fill="#4caf93" font-size="11" font-family="sans-serif" text-anchor="middle">Laurentides</text>
  
  <!-- Lac-Saint-Jean -->
  <ellipse cx="200" cy="100" rx="55" ry="40" 
           fill="#1e3a5c" stroke="#4a9eff" stroke-width="2"/>
  <text x="200" y="95" fill="#4a9eff" font-size="10" font-family="sans-serif" text-anchor="middle" opacity="0.8">Lac-Saint-Jean</text>
  <text x="200" y="108" fill="#4a9eff" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.6">(Lake St. John)</text>
  
  <!-- Abitibi-Témiscamingue -->
  <path d="M 50 80 L 140 70 L 150 140 L 60 150 Z" 
        fill="#3d2a4c" stroke="#ff6b6b" stroke-width="2"/>
  <text x="100" y="110" fill="#ff6b6b" font-size="10" font-family="sans-serif" text-anchor="middle">Abitibi</text>
  
  <!-- Ottawa River (west boundary) -->
  <path d="M 40 160 Q 80 200 120 250" 
        stroke="#4a9eff" stroke-width="6" fill="none" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Legend -->
  <text x="320" y="30" fill="#888" font-size="9" font-family="sans-serif">Régions de</text>
  <text x="320" y="42" fill="#888" font-size="9" font-family="sans-serif">colonisation</text>
  
  <!-- Compass -->
  <circle cx="360" cy="310" r="20" fill="none" stroke="#666" stroke-width="1"/>
  <text x="360" y="295" fill="#888" font-size="10" font-family="sans-serif" text-anchor="middle">N</text>
  <path d="M 360 300 L 360 320 M 350 310 L 370 310" stroke="#666" stroke-width="1"/>
  
  <!-- Montreal marker (reference point) -->
  <circle cx="155" cy="255" r="4" fill="#ffd700"/>
  <text x="155" y="275" fill="#ffd700" font-size="8" font-family="sans-serif" text-anchor="middle">Montréal</text>
</svg>