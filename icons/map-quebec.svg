<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 0 780 560" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Water gradient -->
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8ec9e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6ab4d8;stop-opacity:1"/>
    </linearGradient>
    <!-- Land base gradient -->
    <linearGradient id="landBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e0c8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ddd6b8;stop-opacity:1"/>
    </linearGradient>
    <!-- Surrounding territory (Ontario/US/NB) -->
    <linearGradient id="surroundGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8bfa0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#baaf90;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#333" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- === BACKGROUND (water / ocean / gulf) === -->
  <rect width="800" height="560" fill="url(#waterGrad)"/>

  <!-- === SURROUNDING TERRITORIES === -->
  <!-- Ontario (left side & bottom-left) -->
  <path d="M0,0 L130,0 L130,90 L100,130 L80,180 L70,240 L65,310 L70,370 L80,420 L90,460 L100,490 L120,520 L150,548 L0,556 Z"
        fill="url(#surroundGrad)" stroke="#a08060" stroke-width="0.5"/>
  <!-- US States (bottom) -->
  <path d="M150,556 L120,520 L135,520 L190,530 L280,535 L380,534 L440,530 L500,526 L555,524 L590,530 L620,542 L640,556 Z"
        fill="url(#surroundGrad)" stroke="#a08060" stroke-width="0.5"/>
  <!-- Nouveau-Brunswick (right-bottom) -->
  <path d="M800,556 L640,556 L620,542 L640,500 L660,460 L680,410 L700,350 L720,290 L740,240 L760,210 L780,195 L800,165 Z"
        fill="url(#surroundGrad)" stroke="#a08060" stroke-width="0.5"/>

  <!-- === QUÉBEC TERRITORY BASE (approximate real outline of southern QC) === -->
