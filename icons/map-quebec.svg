    L 390,364
    L 350,375
    L 310,390
    L 270,406
    L 238,422
    L 225,435
    L 220,420
    L 225,405
    Z"
    fill="#5a9e45" opacity="0.75"/>
  <!-- Saguenay-Lac-Saint-Jean zone (green, from river valley going north) -->
  <path d="
    M 440,120
    L 480,100
    L 520,88
    L 555,85
    L 580,90
    L 598,100
    L 610,115
    L 605,130
    L 590,140
    L 575,148
    L 555,155
    L 530,162
    L 510,168
    L 490,172
    L 472,178
    L 458,190
    L 445,210
    L 432,230
    L 420,250
    L 415,265
    L 408,280
    L 400,300
    L 392,318
    L 388,334
