    L 575,82
    L 550,78
    L 518,80
    L 482,88
    L 448,106
    L 432,124
    Z"
    fill="#5a9e45" opacity="0.7"/>
  <!-- Abitibi-Témiscamingue zone (far NW, lighter) -->
  <path d="
    M 120,40
    L 160,20
    L 210,10
    L 240,20
    L 240,60
    L 220,100
    L 200,140
    L 185,185
    L 178,230
    L 175,280
    L 172,330
    L 170,370
    L 168,410
    L 170,445
    L 175,468
    L 165,460
    L 155,445
    L 142,420
    L 130,390
    L 120,355
    L 112,310
    L 108,265
    L 108,215
    L 110,160
    L 112,110
    L 115,70
    Z"
    fill="#5a9e45" opacity="0.6"/>

  <!-- === ST. LAWRENCE RIVER === -->
  <!-- The river runs ENE from the southwest; it starts narrow and widens into Gulf -->
  <!-- Using a filled path between north and south shores -->
  <path d="
    M 135,520
    L 175,510
    L 215,503
    L 255,496
    L 295,487
    L 328,476
    L 355,464
    L 380,451
    L 408,436
    L 435,420
    L 460,406
    L 490,390
    L 515,370
    L 540,350
    L 560,332
    L 580,314
    L 600,296
    L 628,272
    L 650,252
    L 672,238
    L 700,228
    L 728,226
    L 755,232
    L 775,240
    L 782,256
    L 782,275
    L 775,255
    L 755,248
    L 728,246
    L 700,248
    L 672,258
    L 650,272
    L 628,292
    L 600,316
    L 580,334
    L 560,354
    L 540,374
