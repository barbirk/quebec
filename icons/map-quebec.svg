    L 490,416
    L 460,432
    L 435,448
    L 408,464
    L 380,480
    L 355,494
    L 325,508
    L 285,522
    L 248,530
    L 205,532
    L 175,530
    Z"
    fill="#4a9eff" opacity="0.72"/>

  <!-- === SAGUENAY RIVER (flows south into St. Lawrence near Tadoussac) === -->
  <path d="M 500,200 Q 510,240 515,270 Q 520,300 510,330 Q 500,355 492,375"
        stroke="#4a9eff" stroke-width="6" fill="none" opacity="0.65" stroke-linecap="round"/>

  <!-- === OUTAOUAIS / OTTAWA RIVER (far left, into Montreal area) === -->
  <path d="M 120,440 Q 148,440 168,445 Q 190,455 200,475 Q 205,490 205,510"
        stroke="#4a9eff" stroke-width="5" fill="none" opacity="0.55" stroke-linecap="round"/>

  <!-- === LAC-SAINT-JEAN (lake shape at hotspot 2 position ≈ x=60%, y=22% → 480,123) === -->
  <ellipse cx="484" cy="118" rx="32" ry="22"
           fill="#4a9eff" stroke="#2a7abf" stroke-width="1.5" opacity="0.88"/>
  <text x="483" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5"
        font-weight="bold" fill="white">Lac-Saint-Jean</text>

  <!-- === POLITICAL BORDERS (dashed lines) === -->
  <!-- Ontario border (left side, going north from US) -->
  <path d="M 120,490 L 110,430 L 102,360 L 98,290 L 104,220 L 112,160 L 118,100 L 120,40"
        stroke="#666" stroke-width="1.2" stroke-dasharray="6,4" fill="none"/>
  <!-- US border (bottom, roughly straight) -->
  <path d="M 120,490 L 145,516 L 195,530 L 260,534 L 360,534 L 460,530 L 540,524 L 600,524 L 640,540 L 670,548"
        stroke="#666" stroke-width="1.2" stroke-dasharray="6,4" fill="none"/>
  <!-- NB border (east, going north-south) -->
  <path d="M 670,548 L 690,510 L 705,460 L 715,410 L 718,360 L 716,310"
        stroke="#666" stroke-width="1.2" stroke-dasharray="6,4" fill="none"/>

  <!-- === NEIGHBORING TERRITORY LABELS === -->
  <text x="80" y="490" font-family="Arial,sans-serif" font-size="11" fill="#6a5a40"
        font-weight="bold" font-style="italic" text-anchor="middle">ONTARIO</text>
  <text x="430" y="553" font-family="Arial,sans-serif" font-size="10" fill="#6a5a40"
        font-weight="bold" font-style="italic" text-anchor="middle">ÉTATS-UNIS</text>
  <text x="745" y="500" font-family="Arial,sans-serif" font-size="10" fill="#6a5a40"
        font-weight="bold" font-style="italic" text-anchor="middle">NOUVEAU-</text>
  <text x="748" y="513" font-family="Arial,sans-serif" font-size="10" fill="#6a5a40"
        font-weight="bold" font-style="italic" text-anchor="middle">BRUNSWICK</text>
  <!-- Gulf of St Lawrence -->
  <text x="770" y="140" font-family="Arial,sans-serif" font-size="10" fill="#2a7abf"
        font-weight="bold" font-style="italic" text-anchor="middle">GOLFE DU</text>
  <text x="770" y="154" font-family="Arial,sans-serif" font-size="10" fill="#2a7abf"
        font-weight="bold" font-style="italic" text-anchor="middle">ST-LAURENT</text>

  <!-- === REGION LABELS (geographic area names, no circle — hotspot numbers will appear on top) === -->
  <!-- Abitibi at approx (26%, 33%) = (208, 185) — label nearby -->
  <text x="155" y="172" font-family="Arial,sans-serif" font-size="9" fill="#2d5a15"
        font-weight="bold" font-style="italic">Abitibi-</text>
  <text x="152" y="184" font-family="Arial,sans-serif" font-size="9" fill="#2d5a15"
        font-weight="bold" font-style="italic">Témiscamingue</text>
  <!-- Laurentides at (44%, 49%) = (352, 274) — label nearby -->
  <text x="315" y="298" font-family="Arial,sans-serif" font-size="9" fill="#2d5a15"
        font-weight="bold" font-style="italic">Laurentides</text>
  <!-- Gaspésie (top right) -->
  <text x="695" y="215" font-family="Arial,sans-serif" font-size="9.5" fill="#2d5a15"
        font-weight="bold" font-style="italic">Gaspésie</text>

  <!-- === MAJOR CITIES === -->
  <!-- Montréal (big dot, leftish in pre-1850 area) approx x=38%, y=87% = (304, 487) -->
  <circle cx="286" cy="495" r="6.5" fill="#c0392b" stroke="white" stroke-width="1.5"/>
  <text x="300" y="490" font-family="Arial,sans-serif" font-size="10.5" font-weight="bold" fill="#3a1a0a">Montréal</text>

  <!-- Québec City approx x=63%, y=68% = (504, 381) -->
  <circle cx="478" cy="400" r="5.5" fill="#c0392b" stroke="white" stroke-width="1.5"/>
  <text x="490" y="396" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#3a1a0a">Québec</text>

  <!-- Trois-Rivières -->
  <circle cx="380" cy="450" r="4" fill="#8a2a22" stroke="white" stroke-width="1"/>
  <text x="390" y="447" font-family="Arial,sans-serif" font-size="8.5" fill="#3a1a0a">Trois-Rivières</text>

  <!-- Sorel -->
  <circle cx="327" cy="472" r="3.5" fill="#8a2a22" stroke="white" stroke-width="1"/>
  <text x="310" y="466" font-family="Arial,sans-serif" font-size="8" fill="#3a1a0a">Sorel</text>

  <!-- Valleyfield (hotspot 5: 29%,88% = 232,493) -->
  <circle cx="232" cy="510" r="3.5" fill="#8a2a22" stroke="white" stroke-width="1"/>
  <text x="180" y="506" font-family="Arial,sans-serif" font-size="8.5" fill="#3a1a0a">Valleyfield</text>

  <!-- Thetford Mines (hotspot 4: 56%,76% = 448,426) -->
  <circle cx="448" cy="458" r="3.5" fill="#8a2a22" stroke="white" stroke-width="1"/>
  <text x="456" y="466" font-family="Arial,sans-serif" font-size="8.5" fill="#3a1a0a">Thetford Mines</text>

  <!-- Sherbrooke -->
  <circle cx="420" cy="500" r="3.5" fill="#8a2a22" stroke="white" stroke-width="1"/>
  <text x="427" y="498" font-family="Arial,sans-serif" font-size="8" fill="#3a1a0a">Sherbrooke</text>

  <!-- Chicoutimi -->
  <circle cx="525" cy="195" r="3.5" fill="#8a2a22" stroke="white" stroke-width="1"/>
  <text x="534" y="193" font-family="Arial,sans-serif" font-size="8.5" fill="#3a1a0a">Chicoutimi</text>

  <!-- Rivière-du-Loup -->
  <circle cx="590" cy="380" r="3" fill="#8a2a22" stroke="white" stroke-width="1"/>
  <text x="598" y="378" font-family="Arial,sans-serif" font-size="8" fill="#3a1a0a">Rivière-du-Loup</text>

  <!-- Rimouski -->
  <circle cx="632" cy="348" r="3" fill="#8a2a22" stroke="white" stroke-width="1"/>
  <text x="640" y="346" font-family="Arial,sans-serif" font-size="8" fill="#3a1a0a">Rimouski</text>

  <!-- Gaspé -->
  <circle cx="736" cy="260" r="3" fill="#8a2a22" stroke="white" stroke-width="1"/>
  <text x="742" y="258" font-family="Arial,sans-serif" font-size="8" fill="#3a1a0a">Gaspé</text>

  <!-- === LEGEND === -->
  <rect x="10" y="285" width="150" height="138" rx="6" fill="white" fill-opacity="0.88" stroke="#ccc" stroke-width="1"/>
  <text x="85" y="303" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" font-weight="bold" fill="#333">Légende</text>
  <line x1="18" y1="308" x2="152" y2="308" stroke="#ddd" stroke-width="1"/>
  <!-- Avant 1850 -->
  <rect x="18" y="314" width="14" height="10" fill="#c8a840" opacity="0.85" rx="2"/>
  <text x="38" y="323" font-family="Arial,sans-serif" font-size="8.5" fill="#444">Av. 1850 (peuplé)</text>
  <!-- 1850-1900 -->
  <rect x="18" y="330" width="14" height="10" fill="#5a9e45" opacity="0.75" rx="2"/>
  <text x="38" y="339" font-family="Arial,sans-serif" font-size="8.5" fill="#444">1850 à 1900</text>
  <!-- St Lawrence zone indicator -->
  <rect x="18" y="346" width="14" height="10" fill="#4a9eff" opacity="0.72" rx="2"/>
  <text x="38" y="355" font-family="Arial,sans-serif" font-size="8.5" fill="#444">Fleuve St-Laurent</text>
  <!-- Major city -->
  <circle cx="25" cy="370" r="5" fill="#c0392b" stroke="white" stroke-width="1"/>
  <text x="38" y="374" font-family="Arial,sans-serif" font-size="8.5" fill="#444">+250 000 hab.</text>
  <!-- Minor city -->
  <circle cx="25" cy="386" r="3.5" fill="#8a2a22" stroke="white" stroke-width="1"/>
  <text x="38" y="390" font-family="Arial,sans-serif" font-size="8.5" fill="#444">3 000 – 100 000</text>
  <!-- Border -->
  <line x1="18" y1="404" x2="32" y2="404" stroke="#666" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="38" y="407" font-family="Arial,sans-serif" font-size="8.5" fill="#444">Frontière</text>

  <!-- === SCALE BAR === -->
  <g transform="translate(10, 432)">
    <line x1="0" y1="8" x2="80" y2="8" stroke="#444" stroke-width="2"/>
    <line x1="0" y1="4" x2="0" y2="12" stroke="#444" stroke-width="2"/>
    <line x1="40" y1="5" x2="40" y2="11" stroke="#444" stroke-width="1.5"/>
    <line x1="80" y1="4" x2="80" y2="12" stroke="#444" stroke-width="2"/>
    <text x="40" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#444">100 km</text>
  </g>

  <!-- === COMPASS ROSE === -->
  <g transform="translate(750, 360)">
    <circle r="20" fill="white" fill-opacity="0.82" stroke="#aaa" stroke-width="1"/>
    <!-- N (red) -->
    <polygon points="0,-17 4,0 0,-4 -4,0" fill="#c0392b"/>
    <!-- S (grey) -->
    <polygon points="0,17 4,0 0,4 -4,0" fill="#888"/>
    <!-- E -->
    <polygon points="17,0 0,4 4,0 0,-4" fill="#888"/>
    <!-- O/W -->
    <polygon points="-17,0 0,4 -4,0 0,-4" fill="#888"/>
    <text x="0" y="-22" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#c0392b">N</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">S</text>
    <text x="24" y="4" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">E</text>
    <text x="-24" y="4" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">O</text>
  </g>

  <!-- === TITLE === -->
  <text x="400" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#2d5a15">
    Les zones de peuplement du Québec vers 1905
  </text>
</svg>