    L 580,346
    L 558,362
    L 534,380
    L 502,398
    L 474,410
    L 440,422
    L 400,436
    L 360,452
    L 320,468
    Z"
    fill="#c8a840" opacity="0.85"/>
  <!-- South shore of St. Lawrence (pre-1850 - Cantons de l'Est area) -->
  <path d="
    M 205,510
    L 250,505
    L 300,502
    L 340,498
    L 380,492
    L 420,484
    L 460,478
    L 500,475
    L 540,472
    L 580,468
    L 610,462
    L 636,456
    L 660,448
    L 680,440
    L 695,428
    L 715,415
    L 718,440
    L 710,470
    L 695,500
    L 675,525
    L 655,542
    L 638,554
    L 620,542
    L 590,530
    L 555,524
    L 500,526
    L 440,530
    L 380,534
    L 310,534
    L 250,533
    L 200,530
    L 185,518
    Z"
    fill="#c8a840" opacity="0.75"/>

  <!-- === SETTLEMENT ZONES: Entre 1850-1900 (Green) === -->
  <!-- Laurentides expansion zone (north of the St. Lawrence, north shore) -->
  <path d="
    M 230,390
    L 270,375
    L 310,360
    L 350,348
    L 390,338
    L 430,328
    L 470,318
    L 500,308
    L 520,298
    L 540,288
    L 555,278
    L 565,268
    L 575,260
    L 582,250
    L 582,270
    L 575,282
    L 562,294
    L 545,306
    L 522,318
    L 500,330
    L 470,342
