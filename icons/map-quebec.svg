    The map shows southern Quebec roughly between:
    - West: Ontario border  (left ~x=120)
    - South: US border      (bottom ~y=530)
    - East: NB border / Gaspésie tip (~x=780)
    - North: Abitibi in NW (~y=40), then Lac-Saint-Jean (y~80), northern limit ~y=20
    Hotspot positions in data.js (used as % of the SVG image):
      1. Les Laurentides: x=44%, y=49% → (352, 274)
      2. Lac-Saint-Jean:  x=60%, y=22% → (480, 123)
      3. Abitibi:         x=26%, y=33% → (208, 185)
      4. Thetford Mines:  x=56%, y=76% → (448, 426)
      5. Valleyfield:     x=29%, y=88% → (232, 493)
  -->
  <!-- Main Quebec territory shape (clockwise from NW) -->
  <path d="
    M 120,40
    L 160,20
    L 220,8
    L 310,2
    L 400,0
    L 480,10
    L 560,30
    L 620,55
    L 660,80
    L 700,115
    L 730,160
    L 755,205
    L 775,250
    L 782,290
    L 775,320
    L 760,345
    L 745,360
    L 730,375
    L 720,395
    L 715,415
    L 718,440
    L 710,470
    L 695,500
    L 675,525
    L 655,542
    L 638,554
    L 620,542
    L 590,530
    L 555,524
    L 500,526
    L 440,530
    L 380,534
    L 280,535
    L 190,530
    L 135,520
    L 120,490
    L 108,455
    L 100,410
    L 96,360
    L 98,300
    L 105,240
    L 112,180
    L 115,130
    L 118,80
    Z"
    fill="url(#landBase)" stroke="#8a9a60" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- === SETTLEMENT ZONES: Avant 1850 (Yellow-ochre) === -->
  <!-- This is the narrow band along both sides of the St. Lawrence River -->
  <!-- North shore of St. Lawrence (pre-1850) -->
