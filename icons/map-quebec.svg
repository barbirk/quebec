<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" preserveAspectRatio="xMidYMid meet" style="width: 100%; height: 100%; max-height: 280px;">
  <defs>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5c;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0d2137;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="landGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="450" fill="url(#landGrad)"/>
  
  <!-- Quebec Province Outline (approximate but based on real shape) -->
  <path d="M 120 420 
           L 80 380 
           L 40 320
           L 30 250
           L 35 180
           L 50 120
           L 80 70
           L 120 35
           L 170 20
           L 230 15
           L 290 25
           L 340 45
           L 380 80
           L 410 130
           L 430 190
           L 445 260
           L 450 330
           L 445 400
           L 430 445
           L 380 448
           L 320 445
           L 250 442
           L 180 435
           Z" 
        fill="#252538" stroke="#3a3a5c" stroke-width="2"/>
  
  <!-- St. Lawrence River (actual course) -->
  <!-- From Gulf, through Quebec, past Montreal toward Ontario border -->
  <path d="M 460 200 
           Q 420 210 380 220
           Q 340 235 300 260
           Q 260 290 230 330
           Q 200 370 180 400
           Q 160 430 150 450" 
        stroke="#4a9eff" stroke-width="28" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M 460 200 
           Q 420 210 380 220
           Q 340 235 300 260
           Q 260 290 230 330
           Q 200 370 180 400
           Q 160 430 150 450" 
        stroke="#4a9eff" stroke-width="12" fill="none" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Ottawa River (joining St. Lawrence near Montreal) -->
  <path d="M 80 350 Q 110 340 140 345 Q 170 350 195 370" 
        stroke="#4a9eff" stroke-width="8" fill="none" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Saguenay River (flowing into St. Lawrence) -->
  <path d="M 320 80 Q 325 120 330 160 Q 335 200 320 235" 
        stroke="#4a9eff" stroke-width="6" fill="none" opacity="0.35" stroke-linecap="round"/>
  
  <!-- Lake Ontario (western edge) -->
  <ellipse cx="70" cy="380" rx="45" ry="35" fill="url(#waterGrad)" opacity="0.6"/>
  
  <!-- Lac-Saint-Jean (actual location - north, oval shape) -->
  <ellipse cx="300" cy="100" rx="65" ry="45" fill="url(#waterGrad)" stroke="#4a9eff" stroke-width="2" opacity="0.8"/>
  
  <!-- Region Labels -->
  <!-- Laurentides - North of Montreal -->
  <ellipse cx="220" cy="220" rx="50" ry="40" fill="none" stroke="#4caf93" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="220" y="225" fill="#4caf93" font-size="12" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="600">Laurentides</text>
  
  <!-- Lac-Saint-Jean label -->
  <text x="300" y="105" fill="#4a9eff" font-size="11" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="600" opacity="0.9">Lac-Saint-Jean</text>
  
  <!-- Abitibi-Témiscamingue - Northwest -->
  <ellipse cx="130" cy="150" rx="55" ry="50" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="130" y="145" fill="#ff6b6b" font-size="10" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="600">Abitibi</text>
  <text x="130" y="158" fill="#ff6b6b" font-size="9" font-family="system-ui, sans-serif" text-anchor="middle" opacity="0.8">Témiscamingue</text>
  
  <!-- Major Cities -->
  <!-- Quebec City -->
  <circle cx="380" cy="260" r="5" fill="#ffd700"/>
  <text x="380" y="280" fill="#ffd700" font-size="9" font-family="system-ui, sans-serif" text-anchor="middle">Québec</text>
  
  <!-- Montreal -->
  <circle cx="195" cy="355" r="6" fill="#ff6b6b"/>
  <text x="195" y="375" fill="#ff6b6b" font-size="10" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="700">Montréal</text>
  
  <!-- Specific Locations for Hotspots -->
  <!-- Valleyfield - Southwest, near Ontario border -->
  <circle cx="145" cy="395" r="4" fill="#ffa53e"/>
  
  <!-- Thetford Mines - Southeast, Eastern Townships -->
  <circle cx="280" cy="340" r="4" fill="#9c6fff"/>
  
  <!-- Scale indicator -->
  <line x1="400" y1="420" x2="480" y2="420" stroke="#666" stroke-width="2"/>
  <line x1="400" y1="415" x2="400" y2="425" stroke="#666" stroke-width="2"/>
  <line x1="480" y1="415" x2="480" y2="425" stroke="#666" stroke-width="2"/>
  <text x="440" y="435" fill="#888" font-size="9" font-family="system-ui, sans-serif" text-anchor="middle">~100 km</text>
  
  <!-- Compass -->
  <g transform="translate(440, 50)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#666" stroke-width="1"/>
    <polygon points="0,-20 6,6 0,3 -6,6" fill="#ff6b6b"/>
    <polygon points="0,20 6,-6 0,-3 -6,-6" fill="#444"/>
    <text x="0" y="-28" fill="#888" font-size="11" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="600">N</text>
  </g>
  
  <!-- Legend -->
  <text x="20" y="30" fill="#888" font-size="10" font-family="system-ui, sans-serif" font-weight="600">Régions de colonisation vers 1905</text>
  <line x1="20" y1="38" x2="180" y2="38" stroke="#444" stroke-width="1"/>
</svg>